name: Playwright Tests

on:
  push:
    branches:
      - master
      - feature/**
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-mintues:15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:qa
        env:
        ENV :qa
        BASE_URL:${{secrets.BASE_URL}}
        APP_USERNAME:{{secerts.APP_USERNAME}}
        APP_PASSWORD:{{secerts.APP_PASSWORD}}
        API_BASE_URL:{{secerts.API_BASE_URL}}
        API_TOKEN:{{secerts.API_TOKEN}}
        OAUTH_TOKEN:{{secerts.OAUTH_TOKEN}}
       
     - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: reports/html-report/
          retention-days: 7
